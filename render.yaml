services:
  - type: web
    name: contemos-juntos
    env: node
    region: oregon
    plan: free
    
    # Build command
    buildCommand: npm run build
    
    # Start command
    startCommand: npm start
    
    # Puerto
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

